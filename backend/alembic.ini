# Alembic configuration — invoked from `backend/` working dir.
#
# The DB URL is NOT hard-coded here; `alembic/env.py` derives it from
# `app.config.settings.Settings.database.dsn` and rewrites the async driver
# (`postgresql+asyncpg`) to the sync one (`postgresql+psycopg`) Alembic needs.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Async-aware env.py keeps transaction-per-migration semantics; override in
# individual revisions with `transactional_ddl = False` when using
# CREATE INDEX CONCURRENTLY (docs/operations.md §4.2 O4.04).

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
