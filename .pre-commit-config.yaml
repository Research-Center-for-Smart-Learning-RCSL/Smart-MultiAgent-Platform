# Install:  pip install pre-commit && pre-commit install
# Run all:  pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------- Python (backend) ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/(shared_kernel|contexts/.+/domain)/
        args: ["--config-file=backend/pyproject.toml"]
        additional_dependencies:
          - pydantic==2.9.*

  # ---------- JS / TS / Vue (frontend) ----------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, vue, css, json, yaml, markdown]
        additional_dependencies:
          - prettier@3.3.3

  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        language: system
        entry: bash -c 'cd frontend && pnpm exec eslint --max-warnings=0'
        files: ^frontend/src/.*\.(ts|tsx|vue)$
        pass_filenames: false
      - id: vue-tsc-frontend
        name: vue-tsc --noEmit (frontend, incremental)
        language: system
        entry: bash -c 'cd frontend && pnpm exec vue-tsc --noEmit'
        files: ^frontend/src/.*\.(ts|tsx|vue)$
        pass_filenames: false
