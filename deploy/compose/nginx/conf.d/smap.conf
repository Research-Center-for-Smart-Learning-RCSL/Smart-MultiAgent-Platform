upstream smap_backend {
    server backend-web:8000;
    keepalive 32;
}

upstream smap_frontend {
    server frontend:5173;
}

# --- HTTP :80 — redirect everything to HTTPS, except local healthchecks ----
server {
    listen 80 default_server;
    server_name _;

    # $smap_req_id is computed once in the http{} map block (nginx.conf).

    # Container healthcheck hits http://127.0.0.1/healthz — keep plaintext so
    # the Docker healthcheck doesn't need to trust the dev self-signed cert.
    location = /healthz {
        proxy_pass http://smap_backend/healthz;
        proxy_set_header X-Request-Id $smap_req_id;
    }

    location = /readyz {
        proxy_pass http://smap_backend/readyz;
        proxy_set_header X-Request-Id $smap_req_id;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

# --- HTTPS :443 — primary terminator (R19a.01–R19a.04). --------------------
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    # TLS 1.2 floor, 1.3 preferred; AEAD-only cipher suites. TLS 1.3 suite
    # names are fixed by the protocol and enabled via ssl_protocols; the
    # ssl_ciphers line governs TLS 1.2.
    ssl_certificate     /etc/nginx/certs/smap.crt;
    ssl_certificate_key /etc/nginx/certs/smap.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache   shared:smap_tls:10m;
    ssl_session_timeout 1h;
    ssl_session_tickets off;

    # R19a.04 — HSTS on every TLS response. `preload` is safe once the real
    # cert is wired; dev self-signed will cause browser warnings anyway.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # $smap_req_id is computed once in the http{} map block (nginx.conf).

    # Healthz/readyz over TLS for external probes.
    location = /healthz {
        proxy_pass http://smap_backend/healthz;
        proxy_set_header X-Request-Id $smap_req_id;
    }

    location = /readyz {
        proxy_pass http://smap_backend/readyz;
        proxy_set_header X-Request-Id $smap_req_id;
    }

    # /metrics — compose-network + localhost only (B.10).
    location = /metrics {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://smap_backend/metrics;
        proxy_set_header X-Request-Id $smap_req_id;
    }

    # API (REST + OpenAPI + tus under /api/tus). Headers come from backend.
    location /api/ {
        proxy_pass http://smap_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $smap_req_id;
        proxy_set_header Connection        "";
        client_max_body_size 0;
    }

    # WebSockets (§22.14).
    location /ws/ {
        proxy_pass http://smap_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $smap_req_id;
        proxy_read_timeout 3600s;
    }

    # Frontend (dev: vite; prod overlay replaces with static root). Apply the
    # §19a.2 response headers here so the HTML shell is hardened even if the
    # backend layer is bypassed.
    location / {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        proxy_pass http://smap_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Upgrade    $http_upgrade;   # vite HMR over WS
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Request-Id $smap_req_id;
    }
}
