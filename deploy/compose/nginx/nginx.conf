user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  json escape=json
      '{"ts":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
      '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
      '"rt":$request_time,"xri":"$http_x_request_id"}';

    access_log  /var/log/nginx/access.log  json;
    sendfile on;
    keepalive_timeout  65;
    client_max_body_size 0;      # tus streams large bodies; per-location cap instead.
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;

    include /etc/nginx/conf.d/*.conf;
}
