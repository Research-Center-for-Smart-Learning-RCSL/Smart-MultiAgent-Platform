user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Honour an inbound X-Request-Id if present; otherwise use nginx's own
    # auto-generated $request_id (32-char hex). This single variable is used
    # in both the access log and the proxy header so nginx and FastAPI always
    # share the same correlation ID.
    map $http_x_request_id $smap_req_id {
        ""      $request_id;
        default $http_x_request_id;
    }

    log_format  json escape=json
      '{"ts":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
      '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
      '"rt":$request_time,"xri":"$smap_req_id"}';

    access_log  /var/log/nginx/access.log  json;
    server_tokens off;
    sendfile on;
    keepalive_timeout  65;
    client_max_body_size 0;      # tus streams large bodies; per-location cap instead.
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;

    # Extract real client IP from X-Forwarded-For when behind a reverse proxy
    # (e.g. Nginx Proxy Manager). Falls back to $binary_remote_addr for direct
    # connections.
    map $http_x_forwarded_for $limit_key {
        ""      $binary_remote_addr;
        ~^([^,]+) $1;
    }

    # Rate-limit zones — applied per-location in smap.conf.
    limit_req_zone $limit_key zone=auth:10m   rate=5r/s;
    limit_req_zone $limit_key zone=api:10m    rate=30r/s;

    # Gzip compression for text-based responses (B2-1).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/rss+xml
        image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
