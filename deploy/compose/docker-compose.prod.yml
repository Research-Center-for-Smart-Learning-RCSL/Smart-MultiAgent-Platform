# Production overlay. Per §25 the **authoritative** topology is
# `docker-compose.yml`; this file adjoins it with per-service resource limits
# (R20.03 / `docs/operations.md` §3) and tuning for Postgres / Redis, and
# disables the dev bind-mount + reload.
#
# Usage:
#   docker compose \
#     -f deploy/compose/docker-compose.yml \
#     -f deploy/compose/docker-compose.prod.yml up -d
#
# CI matrices the `dev` overlay (docker-compose.override.yml) and the `prod`
# overlay separately — they MUST NOT be mixed (risk: §25 §23 drift).
#
# Every long-running service sets `restart: unless-stopped` so a crash (or a
# host reboot) brings it back without operator intervention; the base file left
# them at the Docker default (`no`).
#
# Tuning target: ≥16-core / 64 GB single host.
# Total hard-limit sum ≈ 56 GB; remaining ~8 GB reserved for OS + Docker daemon.
# If your host has only 32 GB, halve every memory value and drop replicas by 1.
# NOTE: per-container CPU limit must not exceed the host's CPU count (Docker
# rejects `cpus > nproc`). Keep individual limits ≤ 4.0 so CI runners pass.

volumes:
  vault_logs:

services:
  # ---------- Socket proxy ----------
  # Intercepts Docker API calls from backend services. Only the operations
  # needed by DockerRunscSandbox (containers, images, volumes) and agent_fs_gc
  # (volumes) are allowed. Raw /var/run/docker.sock is no longer mounted into
  # any service that processes untrusted HTTP requests.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: smap_docker_proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      VOLUMES: 1
      POST: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 0
      NETWORKS: 0
      SERVICES: 0
      SWARM: 0
      NODES: 0
      BUILD: 0
      EXEC: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [backend_net]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }
        reservations: { cpus: "0.1", memory: 64M }

  # ---------- Edge ----------
  nginx:
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        if [ ! -f /etc/nginx/certs/smap.crt ]; then
          echo "FATAL: /etc/nginx/certs/smap.crt not found."
          echo "Mount real TLS certificates into the nginx_certs volume."
          echo "See deploy/compose/nginx/README.md for instructions."
          exit 1
        fi
        exec nginx -g 'daemon off;'
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 256M }

  # ---------- Backend ----------
  backend-web:
    restart: unless-stopped
    # 4 uvicorn workers per process; 3 replicas → 12 workers total.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      SMAP_APP_ENV: prod
      SMAP_APP_DOCS_ENABLED: "false"
      SMAP_LOG_LEVEL: info
      # Route Docker API calls through the socket proxy instead of raw socket.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      # Internal Vault TLS (B2-2).
      SMAP_VAULT_ADDR: https://vault:8200
      SMAP_VAULT_CA_CERT: /vault-tls/vault-internal-ca.pem
    volumes:
      - ../vault/certs:/vault-tls:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      vault: { condition: service_healthy }
      docker-socket-proxy: { condition: service_started }
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "4.0", memory: 4G }
        reservations: { cpus: "2.0", memory: 2G }

  backend-worker:
    restart: unless-stopped
    environment:
      SMAP_APP_ENV: prod
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      SMAP_VAULT_ADDR: https://vault:8200
      SMAP_VAULT_CA_CERT: /vault-tls/vault-internal-ca.pem
    volumes:
      - ../vault/certs:/vault-tls:ro
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      docker-socket-proxy: { condition: service_started }
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "3.0", memory: 2G }
        reservations: { cpus: "1.0", memory: 1G }

  # ---------- Data services ----------
  # Credential overrides: the base compose uses DEV-ONLY hardcoded passwords.
  # In production every data service MUST receive operator-supplied secrets.
  # Variables use the :? syntax so compose refuses to start if unset.

  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SMAP_DB_USER:-smap}
      POSTGRES_PASSWORD: ${SMAP_DB_PASSWORD:?SMAP_DB_PASSWORD must be set for production}
    shm_size: 2g
    command:
      - postgres
      # shared_buffers = 25 % of postgres container limit (8 GB → 2 GB).
      - -c
      - shared_buffers=2GB
      # effective_cache_size ≈ 75 % of container limit.
      - -c
      - effective_cache_size=6GB
      # work_mem raised for heavier sort / hash workloads.
      - -c
      - work_mem=64MB
      - -c
      - maintenance_work_mem=512MB
      # 3 web replicas × 4 workers × 30 pool + 3 worker replicas × 30 = 450 peak.
      # 512 provides headroom for admin tools and healthcheck probes.
      - -c
      - max_connections=512
      - -c
      - wal_compression=on
    deploy:
      resources:
        limits: { cpus: "4.0", memory: 8G }
        reservations: { cpus: "2.0", memory: 4G }

  redis:
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${SMAP_REDIS_PASSWORD:?SMAP_REDIS_PASSWORD must be set for production}
      # maxmemory = container limit minus ~500 MB overhead for AOF rewrite buffer.
      - --maxmemory
      - "3500mb"
      - --maxmemory-policy
      - "allkeys-lru"
    environment:
      REDISCLI_AUTH: ${SMAP_REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 4G }
        reservations: { cpus: "0.25", memory: 1G }

  qdrant:
    restart: unless-stopped
    deploy:
      resources:
        # Qdrant is mmap-based; more RAM → more vectors stay in page cache.
        limits: { cpus: "4.0", memory: 8G }
        reservations: { cpus: "2.0", memory: 4G }

  neo4j:
    restart: unless-stopped
    shm_size: 2g
    environment:
      NEO4J_server_memory_heap_initial__size: "3G"
      NEO4J_server_memory_heap_max__size: "5G"
      NEO4J_server_memory_pagecache_size: "2G"
    deploy:
      resources:
        limits: { cpus: "4.0", memory: 8G }
        reservations: { cpus: "2.0", memory: 4G }

  minio:
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${SMAP_MINIO_ROOT_USER:?SMAP_MINIO_ROOT_USER must be set for production}
      MINIO_ROOT_PASSWORD: ${SMAP_MINIO_ROOT_PASSWORD:?SMAP_MINIO_ROOT_PASSWORD must be set for production}
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 5G }
        reservations: { cpus: "0.5", memory: 2G }

  vault:
    restart: unless-stopped
    # Override the dev-mode command from docker-compose.yml. In prod the
    # server runs against a real config file (file or raft storage) and is
    # initialized + unsealed manually per deploy/vault/README.md §2.
    command: server -config=/vault/config/vault.hcl
    environment:
      # Unset the dev-token + dev-listener envs so the dev path can never
      # accidentally engage in prod even if the base file changes.
      VAULT_DEV_ROOT_TOKEN_ID: ""
      VAULT_DEV_LISTEN_ADDRESS: ""
      VAULT_ADDR: https://127.0.0.1:8200
      VAULT_CACERT: /vault/tls/vault-internal-ca.pem
    healthcheck:
      # Override base HTTP healthcheck — prod Vault listens on HTTPS only.
      # `vault status` respects VAULT_ADDR + VAULT_CACERT env vars.
      test: ["CMD", "vault", "status", "-format=json"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      # vault_data:/vault/file is inherited from docker-compose.yml; only
      # the new config bind-mount, TLS certs, and audit log volume are added.
      - ../vault/vault.hcl:/vault/config/vault.hcl:ro
      - ../vault/certs:/vault/tls:ro
      - vault_logs:/vault/logs
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 2G }
        reservations: { cpus: "0.25", memory: 512M }

  # ---------- MCP sandbox plane ----------
  egress-proxy:
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 256M }

  mcp-sandbox-supervisor:
    restart: unless-stopped
    deploy:
      resources:
        # The supervisor itself is lightweight (health-check HTTP server only);
        # containers are spawned by backend-web via the socket proxy, not here.
        limits: { cpus: "0.25", memory: 128M }
        reservations: { cpus: "0.1", memory: 64M }

  # ---------- Frontend ----------
  frontend:
    # Prod serves the BUILT SPA via nginx (frontend/Dockerfile stage 2), not the
    # base file's Vite dev server. image + build override the base
    # node:20-alpine; command overrides the base `vite dev`. The base's
    # ../../:/app bind-mount leaks through (compose concatenates `volumes`) but
    # is inert — nginx serves from /usr/share/nginx/html and never reads /app.
    image: smap-frontend:prod
    build:
      context: ../../
      dockerfile: frontend/Dockerfile
    command: ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
