# Production overlay. Per §25 the **authoritative** topology is
# `docker-compose.yml`; this file adjoins it with per-service resource limits
# (R20.03 / `docs/operations.md` §3) and tuning for Postgres / Redis, and
# disables the dev bind-mount + reload.
#
# Usage:
#   docker compose \
#     -f deploy/compose/docker-compose.yml \
#     -f deploy/compose/docker-compose.prod.yml up -d
#
# CI matrices the `dev` overlay (docker-compose.override.yml) and the `prod`
# overlay separately — they MUST NOT be mixed (risk: §25 §23 drift).
#
# Every long-running service sets `restart: unless-stopped` so a crash (or a
# host reboot) brings it back without operator intervention; the base file left
# them at the Docker default (`no`).
#
# Tuning target: ≥16-core / 64 GB single host.
# Total hard-limit sum ≈ 56 GB; remaining ~8 GB reserved for OS + Docker daemon.
# If your host has only 32 GB, halve every memory value and drop replicas by 1.

services:
  nginx:
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 256M }

  backend-web:
    restart: unless-stopped
    # 4 uvicorn workers per process; 3 replicas → 12 workers total.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      SMAP_APP_ENV: prod
      SMAP_APP_DOCS_ENABLED: "false"
      SMAP_LOG_LEVEL: info
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "4.0", memory: 4G }
        reservations: { cpus: "2.0", memory: 2G }

  backend-worker:
    restart: unless-stopped
    environment:
      SMAP_APP_ENV: prod
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "3.0", memory: 2G }
        reservations: { cpus: "1.0", memory: 1G }

  postgres:
    restart: unless-stopped
    command:
      - postgres
      # shared_buffers = 25 % of postgres container limit (8 GB → 2 GB).
      - -c
      - shared_buffers=2GB
      # effective_cache_size ≈ 75 % of container limit.
      - -c
      - effective_cache_size=6GB
      # work_mem raised for heavier sort / hash workloads.
      - -c
      - work_mem=64MB
      - -c
      - maintenance_work_mem=512MB
      # 3 web replicas × 4 workers × 30 pool + 3 worker replicas × 30 = 450 peak.
      # 512 provides headroom for admin tools and healthcheck probes.
      - -c
      - max_connections=512
      - -c
      - wal_compression=on
      # NB: no pg_cron. The pgvector image ships without it, so
      # `shared_preload_libraries=pg_cron` made Postgres exit FATAL at boot —
      # and nothing uses it (periodic work runs on the arq cron worker, and
      # bootstrap db-init already skips the pg_cron extension).
    deploy:
      resources:
        limits: { cpus: "6.0", memory: 8G }
        reservations: { cpus: "3.0", memory: 4G }

  redis:
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      # maxmemory = container limit minus ~500 MB overhead for AOF rewrite buffer.
      - --maxmemory
      - "3500mb"
      - --maxmemory-policy
      - "allkeys-lru"
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 4G }
        reservations: { cpus: "0.25", memory: 1G }

  qdrant:
    restart: unless-stopped
    deploy:
      resources:
        # Qdrant is mmap-based; more RAM → more vectors stay in page cache.
        limits: { cpus: "4.0", memory: 8G }
        reservations: { cpus: "2.0", memory: 4G }

  neo4j:
    restart: unless-stopped
    environment:
      NEO4J_server_memory_heap_initial__size: "3G"
      NEO4J_server_memory_heap_max__size: "5G"
      # pagecache holds the graph on-disk pages; larger = fewer disk reads.
      NEO4J_server_memory_pagecache_size: "2G"
    deploy:
      resources:
        limits: { cpus: "4.0", memory: 8G }
        reservations: { cpus: "2.0", memory: 4G }

  minio:
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 5G }
        reservations: { cpus: "0.5", memory: 2G }

  vault:
    restart: unless-stopped
    # Override the dev-mode command from docker-compose.yml. In prod the
    # server runs against a real config file (file or raft storage) and is
    # initialized + unsealed manually per deploy/vault/README.md §2.
    command: server -config=/vault/config/vault.hcl
    environment:
      # Unset the dev-token + dev-listener envs so the dev path can never
      # accidentally engage in prod even if the base file changes.
      VAULT_DEV_ROOT_TOKEN_ID: ""
      VAULT_DEV_LISTEN_ADDRESS: ""
      VAULT_ADDR: http://0.0.0.0:8200
    volumes:
      # vault_data:/vault/file is inherited from docker-compose.yml; only
      # the new config bind-mount needs to be added here.
      - ../vault/vault.hcl:/vault/config/vault.hcl:ro
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 2G }
        reservations: { cpus: "0.25", memory: 512M }

  egress-proxy:
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 256M }

  mcp-sandbox-supervisor:
    restart: unless-stopped
    deploy:
      resources:
        # Each spawned gVisor container consumes memory here; 4 G gives ~4 concurrent tool calls.
        limits: { cpus: "4.0", memory: 4G }
        reservations: { cpus: "1.0", memory: 1G }

  frontend:
    # Prod serves the BUILT SPA via nginx (frontend/Dockerfile stage 2), not the
    # base file's Vite dev server. image + build override the base
    # node:20-alpine; command overrides the base `vite dev`. The base's
    # ../../:/app bind-mount leaks through (compose concatenates `volumes`) but
    # is inert — nginx serves from /usr/share/nginx/html and never reads /app.
    image: smap-frontend:prod
    build:
      context: ../../
      dockerfile: frontend/Dockerfile
    command: ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
