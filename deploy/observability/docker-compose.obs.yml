# Optional observability overlay for local metrics / tracing / log shipping.
#
# Usage:
#   docker compose -f deploy/compose/docker-compose.yml \
#                  -f deploy/observability/docker-compose.obs.yml up -d
#
# Adds: Prometheus, Grafana, Loki, Tempo, Promtail, OTel Collector.
# Does NOT replace the core stack — it extends it.

name: smap

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: smap_otel_collector
    volumes:
      - ./otel-collector/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - backend_net
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: smap_prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
      # Vault TLS CA so Prometheus can scrape vault:8200/v1/sys/metrics.
      - ../vault/certs/vault-internal-ca.pem:/etc/prometheus/vault-ca.pem:ro
      # Vault metrics token — operator must create this file with a valid token
      # that has sys/metrics read policy. See docs/operations.md §1.
      - ../vault/prometheus-token:/etc/prometheus/vault-token:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - alertmanager
    networks:
      - backend_net
      - data_net
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  loki:
    image: grafana/loki:3.1.0
    container_name: smap_loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - backend_net
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  tempo:
    image: grafana/tempo:2.5.0
    container_name: smap_tempo
    command: -config.file=/etc/tempo.yaml
    volumes:
      - tempo_data:/var/tempo
    configs:
      - source: tempo_config
        target: /etc/tempo.yaml
    ports:
      - "127.0.0.1:3200:3200"
    networks:
      - backend_net
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.1.0
    container_name: smap_promtail
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/promtail
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend_net
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ─── Alertmanager — alert routing to email / Slack / webhook ────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: smap_alertmanager
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - backend_net
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ─── DB exporters — Postgres, Redis, Neo4j metrics ─────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: smap_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${SMAP_DB_USER:-smap}:${SMAP_DB_PASSWORD:?}@postgres:5432/${SMAP_DB_NAME:-smap}?sslmode=disable"
    networks:
      - backend_net
      - data_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: smap_redis_exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${SMAP_REDIS_PASSWORD:?}"
    networks:
      - backend_net
      - data_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  neo4j-exporter:
    image: neo4j:5.24-community
    container_name: smap_neo4j_exporter
    entrypoint: ["sh", "-c", "echo 'Neo4j metrics via plugin — see compose env vars'; sleep infinity"]
    # Neo4j exposes Prometheus metrics natively when the plugin is enabled.
    # This placeholder documents the dependency; the actual metrics come
    # from the core neo4j service with NEO4J_METRICS_* env vars.
    profiles:
      - never
    networks:
      - backend_net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: smap_grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # Override in production: GRAFANA_ADMIN_PASSWORD=<secure-value>
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - backend_net
    depends_on:
      prometheus: { condition: service_healthy }
      loki: { condition: service_healthy }
      alertmanager: { condition: service_healthy }
      tempo: { condition: service_started }
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

configs:
  tempo_config:
    content: |
      stream_over_http_enabled: true
      server:
        http_listen_port: 3200
      distributor:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
      compactor:
        compaction:
          block_retention: 168h
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
          wal:
            path: /var/tempo/wal

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  promtail_positions:
  alertmanager_data:

networks:
  backend_net:
    external: true
    name: smap_backend_net
  data_net:
    external: true
    name: smap_data_net
