groups:
  # ─────────────────────────────────────────────────────────
  # Critical — PagerDuty / immediate operator response
  # ─────────────────────────────────────────────────────────
  - name: smap-critical
    rules:
      - alert: BackendDown
        expr: up{job="smap-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend unreachable for >1m"
          description: "Prometheus cannot scrape backend-web:8000/metrics. All API traffic is likely failing."
          runbook: "Check `docker compose ps backend-web` — restart if OOMKilled, check logs if CrashLoopBackOff."

      - alert: ReadyzFailing
        expr: smap_readyz_status != 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "/readyz reports unhealthy for >2m"
          description: "At least one backend dependency (Postgres, Redis, Qdrant, Neo4j, MinIO, Vault) is failing health checks."
          runbook: "curl /readyz to identify which dependency is down. Check that service's container logs."

      - alert: VaultSealed
        expr: vault_core_unsealed == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Vault is sealed"
          description: "Vault has been sealed for >30s. All key operations (JWT signing, encryption, secret reads) are blocked. Backend will return 503 on auth endpoints."
          runbook: "Unseal with 3-of-5 keys: `docker compose exec vault vault operator unseal $KEY`. See deploy/vault/README.md §6."

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Postgres exporter unreachable"
          description: "If postgres-exporter is deployed, this means Postgres is down or the exporter crashed."
          runbook: "Check `docker compose ps postgres` and `docker compose logs postgres --tail 50`."

  # ─────────────────────────────────────────────────────────
  # High — respond within 15 minutes
  # ─────────────────────────────────────────────────────────
  - name: smap-high
    rules:
      - alert: DbPoolExhausted
        expr: smap_db_pool_available <= 2
        for: 3m
        labels:
          severity: high
        annotations:
          summary: "DB connection pool nearly exhausted (≤2 available)"
          description: "Pool size {{ $value }} available. New requests will queue/timeout. Indicates connection leak or traffic spike."
          runbook: "1. Check active queries: `SELECT * FROM pg_stat_activity WHERE state='active'`. 2. Check for long-running transactions. 3. If leak, restart backend-web."

      - alert: DbPoolWaiters
        expr: smap_db_pool_checkedout >= (smap_db_pool_size * 0.9)
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "DB pool >90% checked out for >2m"
          description: "{{ $value }} connections checked out. Pool exhaustion imminent."
          runbook: "Same as DbPoolExhausted. Consider increasing SMAP_DB_POOL_SIZE if traffic is legitimate."

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: high
        annotations:
          summary: "Redis exporter unreachable"
          description: "Redis may be down. Affects: session storage, rate limiting, arq task queue, pub/sub."
          runbook: "Check `docker compose ps redis`. If OOMKilled, check maxmemory settings."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(smap_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(smap_http_requests_total[5m]))
          ) > 0.05
        for: 3m
        labels:
          severity: high
        annotations:
          summary: "HTTP 5xx error rate >5% for >3m"
          description: "{{ $value | humanizePercentage }} of requests returning server errors."
          runbook: "Check backend logs: `docker compose logs --since 5m backend-web | grep error`."

      - alert: TlsCertExpiringSoon
        expr: smap_tls_cert_expiry_seconds < 604800
        for: 1h
        labels:
          severity: high
        annotations:
          summary: "TLS certificate expires in <7 days"
          description: "Certificate for {{ $labels.domain }} expires in {{ $value | humanizeDuration }}."
          runbook: "Renew cert, mount into nginx_certs volume, reload nginx: `docker compose exec nginx nginx -s reload`."

      - alert: VaultTlsCertExpiringSoon
        expr: smap_vault_tls_cert_expiry_seconds < 604800
        for: 1h
        labels:
          severity: high
        annotations:
          summary: "Vault internal TLS cert expires in <7 days"
          description: "Regenerate with `bash deploy/vault/gen-internal-tls.sh` and restart Vault."
          runbook: "See deploy/vault/README.md TLS section. Restart Vault after cert replacement; unseal if needed."

  # ─────────────────────────────────────────────────────────
  # Warning — review within 4 hours
  # ─────────────────────────────────────────────────────────
  - name: smap-warning
    rules:
      - alert: TlsCertExpiring30d
        expr: smap_tls_cert_expiry_seconds < 2592000
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS certificate expires in <30 days"
          description: "Certificate for {{ $labels.domain }} expires in {{ $value | humanizeDuration }}. Plan renewal."

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(smap_http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency >5s for >5m"
          description: "Slow responses indicate DB pressure, lock contention, or upstream (LLM) timeouts."
          runbook: "Check slow queries in Postgres and backend logs for timeout/deadline errors."

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Root filesystem <15% free"
          description: "{{ $value | humanizePercentage }} free. Docker images, logs, and DB WAL can fill disk quickly."
          runbook: "1. `docker system prune`. 2. Rotate logs. 3. Check pg_wal size. 4. Run retention workers manually."

      - alert: QdrantDown
        expr: up{job="qdrant"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Qdrant unreachable for >2m"
          description: "RAG retrieval and vector search are failing. Chatroom responses will lack grounding."
          runbook: "Check `docker compose ps qdrant` and memory usage (Qdrant is mmap-heavy)."

      - alert: MinioDown
        expr: up{job="minio"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MinIO unreachable for >2m"
          description: "File uploads, downloads, and exports are failing."
          runbook: "Check `docker compose ps minio`. Verify disk space on minio_data volume."

      - alert: WorkerQueueBacklog
        expr: smap_arq_queue_length > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Worker task queue backlog >100 for >5m"
          description: "{{ $value }} tasks queued. Workers may be stuck or under-provisioned."
          runbook: "Check worker logs, verify Redis connectivity, consider scaling worker replicas."

      - alert: WorkflowRunStuck
        expr: smap_workflow_run_stuck_count > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Workflow run(s) stuck for >10m"
          description: "{{ $value }} workflow runs have not progressed. Watchdog should recover these."
          runbook: "Check backend-worker logs for watchdog errors. Manual: PATCH /api/admin/workflow-runs/{id}/cancel."
