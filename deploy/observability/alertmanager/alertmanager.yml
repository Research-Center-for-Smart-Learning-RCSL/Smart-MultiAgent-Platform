# Alertmanager configuration for SMAP.
#
# Default: all alerts go to the "null" receiver (logged but not routed).
# Operators MUST configure at least one real receiver before production.
#
# Examples:
#   - Email via SMTP (uncomment the email_configs block)
#   - Slack webhook (uncomment the slack_configs block)
#   - PagerDuty (uncomment the pagerduty_configs block)
#
# See: https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@smap.local'
  # smtp_auth_username: 'alertmanager@smap.local'
  # smtp_auth_password: '<smtp-password>'

route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: critical
      match:
        severity: critical
      repeat_interval: 15m
    - receiver: default
      match:
        severity: high

receivers:
  - name: default
    # By default alerts are written to Alertmanager's own log (stdout) so they
    # are captured by Promtail/Loki. Replace with a real receiver for production:
    #
    # email_configs:
    #   - to: 'ops@example.com'
    #     send_resolved: true
    #
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/T.../B.../...'
    #     channel: '#smap-alerts'
    #     send_resolved: true
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    webhook_configs:
      - url: 'http://127.0.0.1:9093/-/healthy'
        send_resolved: true

  - name: critical
    # Replace with a real receiver (PagerDuty / email / Slack) for production:
    #
    # pagerduty_configs:
    #   - service_key: '<pagerduty-integration-key>'
    #     severity: critical
    #
    # email_configs:
    #   - to: 'oncall@example.com'
    #     send_resolved: true
    webhook_configs:
      - url: 'http://127.0.0.1:9093/-/healthy'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: high
    equal: ['alertname']
