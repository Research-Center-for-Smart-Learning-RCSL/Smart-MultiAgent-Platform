<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 470" role="img" aria-label="SMAP — Smart Multi-Agent Platform" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Decorative orbit -->
  <circle cx="210" cy="175" r="150" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="2 10" opacity="0.4"/>

  <!-- Edges: hub to each satellite -->
  <g stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.45">
    <line x1="210" y1="175" x2="210" y2="55"/>
    <line x1="210" y1="175" x2="314" y2="115"/>
    <line x1="210" y1="175" x2="314" y2="235"/>
    <line x1="210" y1="175" x2="210" y2="295"/>
    <line x1="210" y1="175" x2="106" y2="235"/>
    <line x1="210" y1="175" x2="106" y2="115"/>
  </g>

  <!-- Satellites (heterogeneous radii) and central hub -->
  <g fill="url(#accent)">
    <circle cx="210" cy="55" r="12"/>
    <circle cx="314" cy="115" r="8"/>
    <circle cx="314" cy="235" r="10"/>
    <circle cx="210" cy="295" r="9"/>
    <circle cx="106" cy="235" r="8"/>
    <circle cx="106" cy="115" r="11"/>
    <circle cx="210" cy="175" r="16"/>
  </g>

  <!-- Wordmark -->
  <text x="210" y="402" text-anchor="middle" font-size="66" font-weight="700" letter-spacing="4" fill="url(#accent)">SMAP</text>
  <text x="210" y="436" text-anchor="middle" font-size="19" font-weight="500" letter-spacing="0.5" fill="#7d8aa5">Smart Multi-Agent Platform</text>
</svg>
